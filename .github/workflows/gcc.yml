name: Linux GCC

on: [push, pull_request]

concurrency:
  group: ${{ github.ref }}-${{ github.head_ref }}-linux-gcc
  cancel-in-progress: true

jobs:
  library:
    name: GNU@9.3 C++17 Release - Mesh ${{matrix.mesh_precision}} Particles ${{matrix.particles}} ${{matrix.particles_precision}}
    runs-on: ubuntu-22.04
    # env: {CXXFLAGS: "-fno-operator-names -Werror -Wall -Wextra -Wpedantic -Wnull-dereference -Wfloat-conversion -Wshadow -Woverloaded-virtual"}
    strategy:
      matrix:
        particles: [OFF, ON]
        particles_precision: [DOUBLE, SINGLE]
        mesh_precision: [DOUBLE, SINGLE]
        exclude:
          - particles: OFF
            particles_precision: SINGLE
          - mesh_precision: SINGLE
            particles: OFF

    steps:

    - uses: actions/checkout@v5
      with:
        submodules: true

    - name: Install Dependencies
      run: Submodules/AMReX/.github/workflows/dependencies/dependencies.sh

    - name: Install CCache
      run: Submodules/AMReX/.github/workflows/dependencies/dependencies_ccache.sh

    - name: Set Up Cache
      uses: actions/cache@v5
      with:
        path: ~/.cache/ccache
        key: ccache-${{ github.workflow }}-${{ github.job }}-git-${{ github.sha }}
        restore-keys: |
             ccache-${{ github.workflow }}-${{ github.job }}-git-

    - name: Configure Project and Generate Build System
      run: |
        cmake \
          -B${{runner.workspace}}/ERF/build \
          -DCMAKE_INSTALL_PREFIX:PATH=${{runner.workspace}}/ERF/install \
          -DCMAKE_BUILD_TYPE:STRING=Debug \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DERF_DIM:STRING=3 \
          -DERF_ENABLE_MPI:BOOL=ON \
          '-DERF_PARALLEL_TEST_NRANKS:STRING=1;2;4' \
          -DERF_ENABLE_PARTICLES:BOOL=${{matrix.particles}} \
          -DERF_PRECISION:STRING=${{matrix.mesh_precision}} \
          -DERF_PARTICLES_PRECISION:STRING=${{matrix.particles_precision}} \
          -DERF_ENABLE_TESTS:BOOL=ON \
          -DERF_ENABLE_ALL_WARNINGS:BOOL=ON \
          -DERF_ENABLE_FCOMPARE:BOOL=ON \
          ${{github.workspace}};

    - name: Compile and Link
      run: |
        export CCACHE_COMPRESS=1
        export CCACHE_COMPRESSLEVEL=10
        export CCACHE_MAXSIZE=300M
        ccache -z

        cmake --build ${{runner.workspace}}/ERF/build --parallel 2 --verbose \
        2>&1 | tee -a ${{runner.workspace}}/build-output.txt;

        ccache -s
        du -hs ~/.cache/ccache

    - name: Report
      run: |
        grep -Ei "warning:|error:" ${{runner.workspace}}/build-output.txt \
          | grep -Ev "Submodules/(amrex|googletest)" | grep -Ev "lto-wrapper: warning:" | sort | uniq \
          | awk 'BEGIN{i=0}{print $0}{i++}END{print "Warnings: "i}' > ${{runner.workspace}}/build-output-warnings.txt
        cat ${{runner.workspace}}/build-output-warnings.txt
        export return=$(tail -n 1 ${{runner.workspace}}/build-output-warnings.txt | awk '{print $2}')
        exit ${return}

    - name: Check Unit Test Registration
      if: matrix.particles_precision == 'DOUBLE' && matrix.mesh_precision == 'DOUBLE'
      run: |
        Tests/Unit/erf_unit_tests --gtest_list_tests | tee ${{runner.workspace}}/unit-test-list.txt
        grep -Eq '^[A-Za-z0-9_].*\.$' ${{runner.workspace}}/unit-test-list.txt
      working-directory: ${{runner.workspace}}/ERF/build

    - name: Run Serial Unit Tests
      if: matrix.particles_precision == 'DOUBLE' && matrix.mesh_precision == 'DOUBLE'
      run: |
        ctest -L unit --output-on-failure --no-tests=error
      working-directory: ${{runner.workspace}}/ERF/build

    - name: Run Parallel Tests
      if: matrix.particles_precision == 'DOUBLE' && matrix.mesh_precision == 'DOUBLE'
      run: |
        ctest -L parallel --output-on-failure --no-tests=error
      working-directory: ${{runner.workspace}}/ERF/build

    - name: CMake Regression Tests # see file ERF/Tests/CTestList.cmake
      if: matrix.particles_precision == 'DOUBLE' && matrix.mesh_precision == 'DOUBLE'
      run: |
        ctest -L regression -VV
      working-directory: ${{runner.workspace}}/ERF/build
